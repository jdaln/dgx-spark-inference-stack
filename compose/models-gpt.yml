x-model-common: &model-common
  profiles: ["models"]
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: "all"
            capabilities: ["gpu"]
  devices:
    - /dev/infiniband:/dev/infiniband
  shm_size: "16g"
  ulimits:
    memlock: -1
    stack: 67108864
  restart: "no"
  logging:
    driver: ${DOCKER_LOG_DRIVER:-json-file}
    options:
      max-size: "10m"
      max-file: "3"
  networks:
    - default
    - vllm_internal

x-env-common: &env-common
  HF_HOME: /root/.cache/huggingface
  TIKTOKEN_ENCODINGS_BASE: ${GPT_TIKTOKEN_ENCODINGS_BASE:-/workspace/vllm/tiktoken_encodings}
  VLLM_API_KEY: ${VLLM_API_KEY:-63TestTOKEN0REPLACEME}
  VLLM_NO_USAGE_STATS: "1"
  VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8: "1"
  VLLM_CONFIGURE_LOGGING: ${VLLM_LOGGING:-0}
  FLASHINFER_LOGLEVEL: "0"
  FLASHINFER_JIT_VERBOSE: "0"
  FLASHINFER_NVCC_THREADS: ${GPT_MXFP4_NVCC_THREADS:-2}
  MAX_JOBS: ${GPT_MXFP4_MAX_JOBS:-2}
  CMAKE_BUILD_PARALLEL_LEVEL: ${GPT_MXFP4_MAX_JOBS:-2}
  NINJAFLAGS: -j${GPT_MXFP4_MAX_JOBS:-2}
  MAKEFLAGS: -j${GPT_MXFP4_MAX_JOBS:-2}

x-mxfp4-build: &mxfp4-build
  context: ..
  dockerfile: ./custom-docker-containers/vllm-node-mxfp4/Dockerfile

x-healthcheck-default: &healthcheck-default
  test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
  interval: 30s
  timeout: 5s
  retries: 5

services:
  vllm-oss20b:
    <<: *model-common
    build: *mxfp4-build
    image: ${VLLM_TRACK_IMAGE_MXFP4:-vllm-node-mxfp4}
    container_name: vllm-oss20b
    command:
      - vllm
      - serve
      - --model
      - openai/gpt-oss-20b
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - gpt-oss-20b
      - --quantization
      - mxfp4
      - --mxfp4-backend
      - CUTLASS
      - --mxfp4-layers
      - moe,qkv,o,lm_head
      - --attention-backend
      - FLASHINFER
      - --kv-cache-dtype
      - fp8
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      - "0.70"
      - --max-num-seqs
      - "2"
      - --max-num-batched-tokens
      - "8192"
      - --max-model-len
      - "131072"
      - --enable-prefix-caching
      - --load-format
      - fastsafetensors
      - --disable-log-stats
      - --disable-log-requests
      - --enable-auto-tool-choice
      - --tool-call-parser
      - openai
    volumes:
        # HuggingFace model cache (required)
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      # FlashInfer JIT cache (speeds up startup after first run)
      - ../.cache/flashinfer:/root/.cache/flashinfer
      # vLLM cache
      - ../.cache/vllm:/root/.cache/vllm
      # Ccache for rebuilds
      - ../.cache/ccache:/root/.ccache
      - ../models:/models
    environment:
      <<: *env-common
    healthcheck:
      <<: *healthcheck-default
      start_period: 900s     # <-- wait 15 min before the first check
 
  vllm-oss120b:
    <<: *model-common
    build: *mxfp4-build
    image: ${VLLM_TRACK_IMAGE_MXFP4:-vllm-node-mxfp4}
    container_name: vllm-oss120b
    command:
      - vllm
      - serve
      - --model
      - openai/gpt-oss-120b
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - gpt-oss-120b
      - --quantization
      - mxfp4
      - --mxfp4-backend
      - CUTLASS
      - --mxfp4-layers
      - moe,qkv,o,lm_head
      - --attention-backend
      - FLASHINFER
      - --kv-cache-dtype
      - fp8
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      # Normal-mode default. The small utility model can still coexist at 0.80, but
      # the practical combined budget for substantial LLMs on this host is only about 0.94,
      # so gpt-oss-20b and gpt-oss-120b should not both be resident at once.
      - ${GPT_OSS_120B_GPU_MEMORY_UTILIZATION:-0.80}
      # Exclusive-only fallback for quick IDE switching when you also change models.json lifecycle back to exclusive:
      # - ${GPT_OSS_120B_GPU_MEMORY_UTILIZATION:-0.93}
      - --max-num-seqs
      - "2"
      - --max-num-batched-tokens
      - "8192"
      - --max-model-len
      - "131072"
      - --enable-prefix-caching
      - --load-format
      - fastsafetensors
      - --disable-log-stats
      - --disable-log-requests
      - --enable-auto-tool-choice
      - --tool-call-parser
      - openai
      - --reasoning-parser
      - openai_gptoss
    volumes:
        # HuggingFace model cache (required)
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      # FlashInfer JIT cache (speeds up startup after first run)
      - ../.cache/flashinfer:/root/.cache/flashinfer
      # vLLM cache
      - ../.cache/vllm:/root/.cache/vllm
      # Ccache for rebuilds
      - ../.cache/ccache:/root/.ccache
      - ../models:/models
    environment:
      <<: *env-common
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s     # <-- wait 30 min before the first check

  vllm-huihui-gpt-oss-120b-abliterated:
    <<: *model-common
    build: *mxfp4-build
    image: ${VLLM_TRACK_IMAGE_MXFP4:-vllm-node-mxfp4}
    container_name: vllm-huihui-gpt-oss-120b-abliterated
    command:
      - vllm
      - serve
      - --model
      - batsclamp/Huihui-gpt-oss-120b-mxfp4-abliterated
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - huihui-gpt-oss-120b-mxfp4-abliterated
      - --quantization
      - mxfp4
      - --mxfp4-backend
      - CUTLASS
      - --mxfp4-layers
      - moe,qkv,o,lm_head
      - --attention-backend
      - FLASHINFER
      - --kv-cache-dtype
      - fp8
      - --tensor-parallel-size
      - "1"
      - --gpu-memory-utilization
      - ${HUIHUI_GPT_OSS_120B_GPU_MEMORY_UTILIZATION:-0.80}
      - --max-num-seqs
      - "2"
      - --max-num-batched-tokens
      - "8192"
      - --max-model-len
      - "131072"
      - --enable-prefix-caching
      - --load-format
      - fastsafetensors
      - --disable-log-stats
      - --disable-log-requests
      - --enable-auto-tool-choice
      - --tool-call-parser
      - openai
      - --reasoning-parser
      - openai_gptoss
    volumes:
        # HuggingFace model cache (required)
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      # FlashInfer JIT cache (speeds up startup after first run)
      - ../.cache/flashinfer:/root/.cache/flashinfer
      # vLLM cache
      - ../.cache/vllm:/root/.cache/vllm
      # Ccache for rebuilds
      - ../.cache/ccache:/root/.ccache
      - ../models:/models
    environment:
      <<: *env-common
    healthcheck:
      <<: *healthcheck-default
      start_period: 5400s     # first cold download/load can exceed 30 minutes; align with the current long manual startup window

