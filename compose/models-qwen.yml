x-model-common: &model-common
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: "all"
            capabilities: ["gpu"]
  shm_size: "16g"
  ulimits:
    memlock: -1
    stack: 67108864
  restart: "no"
  logging:
    driver: ${DOCKER_LOG_DRIVER:-json-file}
    options:
      max-size: "10m"
      max-file: "3"
  networks:
    - default
    - vllm_internal

x-model-profiled: &model-profiled
  <<: *model-common
  profiles: ["models"]

x-env-common: &env-common
  HF_HOME: /root/.cache/huggingface
  VLLM_API_KEY: ${VLLM_API_KEY:-63TestTOKEN0REPLACEME}
  VLLM_NO_USAGE_STATS: "1"
  VLLM_CONFIGURE_LOGGING: ${VLLM_LOGGING:-0}

x-healthcheck-default: &healthcheck-default
  test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
  interval: 30s
  timeout: 5s
  retries: 5

x-huihui-qwen36-27b-build: &huihui-qwen36-27b-build
  context: ..
  dockerfile: ./custom-docker-containers/vllm-node-mxfp4-qwen35/Dockerfile
  args:
    BASE_IMAGE: ${VLLM_TRACK_IMAGE_TF5:-vllm-node-tf5}

services:
  # Qwen3-Next models moved to models-experimental.yml due to GB10/CUDA 12.1 crashes
  # See README.md "Known Issues" section for details

  vllm-qwen3-vl-32b-fp4:
    <<: *model-profiled
    image: ${VLLM_TRACK_AVAROK:-avarok/vllm-dgx-spark:v11@sha256:246723e9a74163e7828716c1587d6c5208a9cf0dc8d1195cbd33f68234b1024b}
    container_name: vllm-qwen3-vl-32b-fp4
    command:
      - serve
      - --model
      - RedHatAI/Qwen3-VL-32B-Instruct-NVFP4
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - qwen3-vl-32b-instruct-fp4
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --gpu-memory-utilization
      - "0.82"
      - --tensor_parallel_size
      - "1"
      - --quantization
      - compressed-tensors
      - --kv-cache-dtype
      - fp8
      - --max-model-len
      - "131072"
      - --disable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
      - ../flashinfer_cache:/root/.cache/flashinfer
      - ../torch_extensions:/root/.cache/torch_extensions
      - ../torchinductor:/tmp/torchinductor_root
    environment:
      <<: *env-common
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s

  vllm-qwen3.5-0.8b:
    <<: *model-common
    image: scitrera/dgx-spark-sglang:0.5.9-t5@sha256:a055011be7feb2e43ad8dbc365e3903f869c63b992864691f7edf83015bb941d
    container_name: vllm-qwen3.5-0.8b
    entrypoint: []
    command:
      - python3
      - -m
      - sglang.launch_server
      - --model-path
      - Qwen/Qwen3.5-0.8B
      - --served-model-name
      - qwen3.5-0.8b
      - --mem-fraction-static
      - "${QWEN35_0P8B_GPU_MEMORY_UTILIZATION:-0.05}"
      - --tp-size
      - "${QWEN35_0P8B_TENSOR_PARALLEL_SIZE:-1}"
      - --attention-backend
      - triton
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --context-length
      - "${QWEN35_0P8B_MAX_MODEL_LEN:-32768}"
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
    environment:
      <<: *env-common
      HF_HUB_CACHE: /models
      HUGGINGFACE_HUB_CACHE: /models
    healthcheck:
      <<: *healthcheck-default
      test:
        - CMD
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()
      start_period: 1800s

