name: Waker Smoke Test

on:
  pull_request:
    paths:
      - .github/workflows/waker-smoke.yml
      - waker/**
      - shared/models-config.mjs
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run waker smoke test in container
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":/workspace \
            -w /workspace/waker \
            # renovate: datasource=docker
            node:20-alpine@sha256:afdf98210b07b586eb71fa22ba2e432e058e4cd1304d31ed60888755b8c865fb \
            sh -lc "npm ci && npm test"
