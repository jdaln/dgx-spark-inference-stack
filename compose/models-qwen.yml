x-model-common: &model-common
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: "all"
            capabilities: ["gpu"]
  shm_size: "16g"
  ulimits:
    memlock: -1
    stack: 67108864
  restart: "no"
  logging:
    driver: ${DOCKER_LOG_DRIVER:-json-file}
    options:
      max-size: "10m"
      max-file: "3"
  networks:
    - default
    - vllm_internal

x-model-profiled: &model-profiled
  <<: *model-common
  profiles: ["models"]

x-env-common: &env-common
  HF_HOME: /root/.cache/huggingface
  VLLM_API_KEY: ${VLLM_API_KEY:-63TestTOKEN0REPLACEME}
  VLLM_NO_USAGE_STATS: "1"
  VLLM_CONFIGURE_LOGGING: ${VLLM_LOGGING:-0}

x-healthcheck-default: &healthcheck-default
  test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
  interval: 30s
  timeout: 5s
  retries: 5

services:
  # Qwen3-Next models moved to models-experimental.yml due to GB10/CUDA 12.1 crashes
  # See README.md "Known Issues" section for details

  vllm-qwen3-vl-32b-fp4:
    <<: *model-profiled
    image: avarok/vllm-dgx-spark:v11
    container_name: vllm-qwen3-vl-32b-fp4
    command:
      - serve
      - --model
      - RedHatAI/Qwen3-VL-32B-Instruct-NVFP4
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - qwen3-vl-32b-instruct-fp4
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --gpu-memory-utilization
      - "0.82"
      - --tensor_parallel_size
      - "1"
      - --quantization
      - compressed-tensors
      - --kv-cache-dtype
      - fp8
      - --max-model-len
      - "131072"
      - --disable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
      - ../flashinfer_cache:/root/.cache/flashinfer
      - ../torch_extensions:/root/.cache/torch_extensions
      - ../torchinductor:/tmp/torchinductor_root
    environment:
      <<: *env-common
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s

  vllm-qwen3.5-0.8b:
    <<: *model-common
    image: scitrera/dgx-spark-sglang:0.5.9-t5
    container_name: vllm-qwen3.5-0.8b
    entrypoint: []
    command:
      - python3
      - -m
      - sglang.launch_server
      - --model-path
      - Qwen/Qwen3.5-0.8B
      - --served-model-name
      - qwen3.5-0.8b
      - --mem-fraction-static
      - "${QWEN35_0P8B_GPU_MEMORY_UTILIZATION:-0.05}"
      - --tp-size
      - "${QWEN35_0P8B_TENSOR_PARALLEL_SIZE:-1}"
      - --attention-backend
      - triton
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --context-length
      - "${QWEN35_0P8B_MAX_MODEL_LEN:-32768}"
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
    environment:
      <<: *env-common
      HF_HUB_CACHE: /models
      HUGGINGFACE_HUB_CACHE: /models
    healthcheck:
      <<: *healthcheck-default
      test:
        - CMD
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()
      start_period: 1800s

  vllm-qwen2.5-1.5b:
    # Legacy fallback small model. No longer the always-on utility helper.
    <<: *model-profiled
    image: avarok/vllm-dgx-spark:v11
    container_name: vllm-qwen2.5-1.5b
    command:
      - serve
      - --model
      - Qwen/Qwen2.5-1.5B-Instruct
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - qwen2.5-1.5b-instruct
      - --gpu-memory-utilization
      - "0.04"
      - --dtype
      - bfloat16
      - --max-model-len
      - "8192"
      - --disable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
      - ../flashinfer_cache:/root/.cache/flashinfer
      - ../torch_extensions:/root/.cache/torch_extensions
      - ../torchinductor:/tmp/torchinductor_root
    environment:
      <<: *env-common
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s

  vllm-qwen25-vl-7b:
    <<: *model-profiled
    image: nvcr.io/nvidia/vllm:25.10-py3
    container_name: vllm-qwen25-vl-7b
    command:
      - vllm
      - serve
      - Qwen/Qwen2.5-VL-7B-Instruct-AWQ
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - qwen2.5-vl-7b
      - --gpu-memory-utilization
      - "0.82"
      - --max-num-seqs
      - "16"
      - --max-model-len
      - "32768"
      - --trust-remote-code
      - --disable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
      - ../media:/media:ro
    environment:
      <<: *env-common
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s

  vllm-qwen3-coder-30b:
    <<: *model-profiled
    image: avarok/vllm-dgx-spark:v11
    container_name: vllm-qwen3-coder-30b
    command:
      - serve
      - --model
      - NVFP4/Qwen3-Coder-30B-A3B-Instruct-FP4
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - qwen3-coder-30b-a3b-instruct
      - --gpu-memory-utilization
      - "0.82"
      - --kv-cache-dtype
      - "fp8"
      - --async-scheduling
      - --max-model-len
      - "65536"
      - --quantization
      - modelopt_fp4
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --enforce-eager
      - --disable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
      - ../flashinfer_cache:/root/.cache/flashinfer
      - ../torch_extensions:/root/.cache/torch_extensions
      - ../torchinductor:/tmp/torchinductor_root
    environment:
      <<: *env-common
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s

  vllm-qwen25-coder-7b:
    <<: *model-profiled
    image: nvcr.io/nvidia/vllm:25.10-py3
    container_name: vllm-qwen25-coder-7b
    command:
      - vllm
      - serve
      - Qwen/Qwen2.5-Coder-7B-Instruct
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - qwen2.5-coder-7b-instruct
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --gpu-memory-utilization
      - "0.82"
      - --max-num-seqs
      - "16"
      - --max-model-len
      - "32768"
      - --disable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
    environment:
      <<: *env-common
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s

  vllm-qwen-math:
    <<: *model-profiled
    image: nvcr.io/nvidia/vllm:25.10-py3
    container_name: vllm-qwen-math
    command:
      - vllm
      - serve
      - Qwen/Qwen2.5-Math-1.5B-Instruct
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - qwen-math
      - --gpu-memory-utilization
      - "0.42"
      - --max-num-seqs
      - "3"
      - --max-model-len
      - "4096"
      - --disable-log-requests
      - --disable-log-stats
   # ports: ["8000:8000"]
    volumes:
      - ../models/vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
    environment:
      <<: *env-common
    shm_size: "4g"
    healthcheck:
      <<: *healthcheck-default
      retries: 10
      start_period: 900s     # <-- wait 15 min before the first check

  vllm-qwen3-vl-30b:
    <<: *model-profiled
    image: christopherowen/vllm-dgx-spark:v12
    container_name: vllm-qwen3-vl-30b
    command:
      - vllm
      - serve
      - --model
      - QuantTrio/Qwen3-VL-30B-A3B-Instruct-AWQ
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - qwen3-vl-30b-instruct
      - --gpu-memory-utilization
      - "0.7"
      - --load-format
      - fastsafetensors
      - --max-model-len
      - "32768"
      - --disable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
      - ../flashinfer_cache:/root/.cache/flashinfer
