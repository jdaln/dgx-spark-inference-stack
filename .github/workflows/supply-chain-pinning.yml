name: Supply Chain Pinning

on:
  pull_request:
    paths:
      - .github/workflows/**
      - docker-compose.yml
      - compose/**
      - custom-docker-containers/**
      - request-validator/Dockerfile
      - tools/check-supply-chain-pinning.sh
      - tools/streaming-proxy/Dockerfile
      - waker/Dockerfile
      - renovate.json
  workflow_dispatch:

jobs:
  verify-pinning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify supply-chain pinning
        run: bash tools/check-supply-chain-pinning.sh
