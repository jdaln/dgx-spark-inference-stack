x-model-common: &model-common
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: "all"
            capabilities: ["gpu"]
  shm_size: "16g"
  ulimits:
    memlock: -1
    stack: 67108864
  restart: "no"
  logging:
    driver: ${DOCKER_LOG_DRIVER:-json-file}
    options:
      max-size: "10m"
      max-file: "3"
  networks:
    - default
    - vllm_internal

x-model-profiled: &model-profiled
  <<: *model-common
  profiles: ["models"]

x-env-common: &env-common
  HF_HOME: /root/.cache/huggingface
  VLLM_API_KEY: ${VLLM_API_KEY:-63TestTOKEN0REPLACEME}
  VLLM_NO_USAGE_STATS: "1"
  VLLM_CONFIGURE_LOGGING: ${VLLM_LOGGING:-0}

x-healthcheck-default: &healthcheck-default
  test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
  interval: 30s
  timeout: 5s
  retries: 5

services:
  vllm-glm-4.5-air-fp4:
    <<: *model-profiled
    image: avarok/vllm-dgx-spark:v11
    container_name: vllm-glm-4.5-air-fp4
    command:
      - serve
      - --model
      - Firworks/GLM-4.5-Air-nvfp4
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - glm-4.5-air-fp4
      - --enable-auto-tool-choice
      - --tool-call-parser
      - glm45
      - --gpu-memory-utilization
      - "0.82"
      - --dtype
      - auto
      - --max-model-len
      - "131072"
      - --quantization
      - compressed-tensors
      - --kv-cache-dtype
      - fp8
      - --disable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
      - ../flashinfer_cache:/root/.cache/flashinfer
      - ../torch_extensions:/root/.cache/torch_extensions
      - ../torchinductor:/tmp/torchinductor_root
    environment:
      <<: *env-common
      VLLM_FLASHINFER_MOE_BACKEND: "latency"
      VLLM_USE_FLASHINFER_MOE_FP4: "1"
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s

  vllm-glm-4.6v-flash-fp4:
    <<: *model-profiled
    image: ${VLLM_TRACK_IMAGE_TF5:-avarok/vllm-dgx-spark:v11-tf5}
    container_name: vllm-glm-4.6v-flash-fp4
    command:
      - serve
      - --model
      - Firworks/GLM-4.6V-Flash-nvfp4
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - glm-4.6v-flash-fp4
      - --enable-auto-tool-choice
      - --tool-call-parser
      - glm45
      - --gpu-memory-utilization
      - "0.82"
      - --dtype
      - auto
      - --max-model-len
      - "131072"
      - --quantization
      - compressed-tensors
      - --kv-cache-dtype
      - fp8
      - --disable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
      - ../flashinfer_cache:/root/.cache/flashinfer
      - ../torch_extensions:/root/.cache/torch_extensions
      - ../torchinductor:/tmp/torchinductor_root
    environment:
      <<: *env-common
      VLLM_FLASHINFER_MOE_BACKEND: "latency"
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s

  vllm-glm-4.5-air-derestricted-fp4:
    <<: *model-profiled
    image: avarok/vllm-dgx-spark:v11
    container_name: vllm-glm-4.5-air-derestricted-fp4
    command:
      - serve
      - --model
      - Firworks/GLM-4.5-Air-Derestricted-nvfp4
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - glm-4.5-air-derestricted-fp4
      - --enable-auto-tool-choice
      - --tool-call-parser
      - glm45
      - --gpu-memory-utilization
      - "0.82"
      - --dtype
      - auto
      - --max-model-len
      - "131072"
      - --quantization
      - compressed-tensors
      - --kv-cache-dtype
      - fp8
      - --disable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
      - ../flashinfer_cache:/root/.cache/flashinfer
      - ../torch_extensions:/root/.cache/torch_extensions
      - ../torchinductor:/tmp/torchinductor_root
    environment:
      <<: *env-common
      VLLM_FLASHINFER_MOE_BACKEND: "latency"
      VLLM_USE_FLASHINFER_MOE_FP4: "1"
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s

  vllm-glm4-9b:
    <<: *model-profiled
    image: nvcr.io/nvidia/vllm:25.10-py3
    container_name: vllm-glm4-9b
    command:
      - vllm
      - serve
      - THUDM/glm-4-9b-chat
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - glm-4-9b-chat
      - --enable-auto-tool-choice
      - --tool-call-parser
      - glm45
      - --gpu-memory-utilization
      - "0.65"
      - --max-model-len
      - "32768"
      - --max-num-seqs
      - "8"
      - --trust-remote-code
      - --disable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
    environment:
      <<: *env-common
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s

  vllm-glm-4.7-flash-awq:
    <<: *model-profiled
    build:
      context: ..
      dockerfile: ./custom-docker-containers/glm-4.7-flash-AWQ/Dockerfile
      args:
        BASE_IMAGE: ${VLLM_TRACK_IMAGE_TF5:-local/vllm-node-tf5:cu131}
    image: local/vllm-glm-4.7-flash-awq:tf5
    container_name: vllm-glm-4.7-flash-awq
    command:
      - vllm
      - serve
      - cyankiwi/GLM-4.7-Flash-AWQ-4bit
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --download-dir
      - /models
      - --served-model-name
      - glm-4.7-flash-awq
      - --enable-auto-tool-choice
      - --tool-call-parser
      - glm47
      - --reasoning-parser
      - glm45
      - --max-model-len
      - "${GLM_47_FLASH_AWQ_MAX_MODEL_LEN:-131072}"
      - --max-num-batched-tokens
      - "${GLM_47_FLASH_AWQ_MAX_NUM_BATCHED_TOKENS:-2048}"
      - --max-num-seqs
      - "${GLM_47_FLASH_AWQ_MAX_NUM_SEQS:-5}"
      - --gpu-memory-utilization
      - "${GLM_47_FLASH_AWQ_GPU_MEMORY_UTILIZATION:-0.70}"
      - --no-enable-log-requests
      - --disable-log-stats
    volumes:
      - ../vllm_cache_huggingface:/root/.cache/huggingface
      - ../models:/models
      - ../flashinfer_cache:/root/.cache/flashinfer
      - ../torch_extensions:/root/.cache/torch_extensions
      - ../torchinductor:/tmp/torchinductor_root
    environment:
      <<: *env-common
      HF_HUB_DISABLE_XET: "1"
    healthcheck:
      <<: *healthcheck-default
      start_period: 1800s
